name: Mirror to Personal Repository

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to personal repository
        run: |
          git remote add personal https://Joshua-Yel:${{ secrets.PERSONAL_REPO_TOKEN }}@github.com/Joshua-Yel/mp3.git
          git push personal main --force
